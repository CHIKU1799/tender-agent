services:
  - type: web
    name: tender-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENAI_API_KEY
        sync: false        # set manually in Render dashboard
      - key: DASHBOARD_HOST
        value: 0.0.0.0
    disk:
      name: tender-data
      mountPath: /app/output
      sizeGB: 1
